  <style>
    :root {
      --eq-blue: #0B4F9E;

      --eq-blue-mid: #C8DFF5;

      --gray-100: #EFF1F5;
      --gray-200: #DDE1EA;
      --gray-300: #BEC5D2;
      --gray-400: #8E97A8;
      --gray-500: #636E82;
      --gray-700: #353D4F;
      --gray-900: #1A2130;

    .logo-wrap{display:flex;align-items:center;gap:2px;text-decoration:none;}
    .logo-eq{font-size:26px;font-weight:800;color:var(--eq-blue);letter-spacing:-1px;}
    .logo-dot{display:inline-block;width:9px;height:9px;background:var(--eq-orange);border-radius:50%;position:relative;top:-14px;margin-left:1px;}
    .topbar-sep{width:1px;height:30px;background:var(--gray-200);margin:0 6px;}
    .topbar-title{font-size:15px;font-weight:600;color:var(--gray-700);}
    .topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
    .db-status{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 12px;border-radius:30px;}

    .db-local{background:var(--amber-pale);color:var(--amber);border:1px solid #fde68a;}

    .sidebar{width:var(--sidebar-w);background:var(--white);border-right:1px solid var(--gray-200);position:fixed;top:var(--header-h);bottom:0;left:0;display:flex;flex-direction:column;padding:16px 0;overflow-y:auto;z-index:100;}

    .nav-item:hover{background:var(--gray-50);color:var(--eq-blue);}
    .nav-item.active{background:var(--eq-blue-pale);color:var(--eq-blue);border-left-color:var(--eq-blue);font-weight:600;}

    .content{margin-left:var(--sidebar-w);flex:1;padding:28px 32px 80px;max-width:calc(100vw - var(--sidebar-w));}

    .tab-btn.active{color:var(--eq-blue);border-bottom-color:var(--eq-blue);}

    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px;}
    .stat-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:18px 20px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;transition:transform .2s;}

    .stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius-lg) var(--radius-lg) 0 0;}
    .stat-card.blue::after{background:var(--eq-blue);}

    .stat-icon.orange{background:var(--eq-orange-pale);}
    .stat-icon.green{background:var(--green-pale);}

    .panel-header{padding:16px 22px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .panel-title{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;color:var(--gray-900);}
    .panel-icon{width:30px;height:30px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
    .panel-icon.blue{background:var(--eq-blue-pale);}
    .panel-icon.orange{background:var(--eq-orange-pale);}

    .btn:disabled{opacity:0.6;cursor:not-allowed;}
    .btn-pdf{background:#E53935;color:white;}
    .btn-excel{background:#1D6F42;color:white;}
    .btn-csv{background:#5C6BC0;color:white;}

    .export-group{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

    .upload-zone .upload-icon{font-size:30px;margin-bottom:8px;}
    .upload-zone p{font-size:13px;color:var(--gray-400);}

    .ocr-progress-bar{height:100%;background:linear-gradient(90deg,var(--eq-blue),var(--eq-orange));border-radius:4px;width:0%;transition:width .3s;}
    .ocr-progress-text{font-size:11px;color:var(--gray-400);margin-top:6px;text-align:center;display:none;}
    .ocr-output{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:12px;font-size:12px;font-family:'Courier New',monospace;color:var(--gray-500);max-height:150px;overflow-y:auto;min-height:60px;}

    #toast{position:fixed;bottom:28px;right:28px;min-width:280px;max-width:360px;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:14px 18px;display:none;align-items:center;gap:12px;z-index:10000;box-shadow:var(--shadow-md);}

    .toast-icon{width:32px;height:32px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
    .toast-icon.ok{background:var(--green-pale);}
    .toast-icon.err{background:var(--red-pale);}
    .toast-icon.info{background:var(--eq-blue-pale);}
    .toast-bar{position:absolute;bottom:0;left:0;height:3px;border-radius:0 0 var(--radius-lg) var(--radius-lg);background:var(--green);animation:shrink 3.4s linear forwards;}
    #toast.err .toast-bar{background:var(--red);}

    .employee-panel{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);margin-bottom:20px;overflow:hidden;}

      .sidebar{display:none;}
      .content{margin-left:0;max-width:100%;padding:20px 16px 60px;}
      .form-grid{grid-template-columns:1fr;}
      .form-group.span-2{grid-column:span 1;}
    }
  </style>
</head>
<body>

<div id="toast" role="alert" aria-live="polite">

              <input type="number" class="form-input" id="totalHTInput" step="0.01" placeholder="0,00"/>
            </div>

              <label class="form-label">Total TTC (DH) *</label>
              <input type="number" class="form-input" id="amountInput" step="0.01" placeholder="0,00"/>
            </div>

          <button class="btn btn-primary btn-full" style="margin-top:10px;" onclick="fillFormFromOCR()">⬅️ Remplir formulaire</button>
        </div>

<script>
'use strict';

let ocrText = '';
let ocrRunning = false;
let selectedFile = null;
let employeeInfo = { nom: '', prenom: '', dept: '' };

// Toast
function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  const icon = document.getElementById('toastIcon');
  const msgEl = document.getElementById('toastMsg');
  const bar = document.getElementById('toastBar');
  icon.textContent = {'ok':'✓','err':'✕','info':'ℹ'}[type] || '✓';
  icon.className = `toast-icon ${type}`;
  msgEl.textContent = msg;
  t.className = 'toast show' + (type === 'err' ? ' err' : '');
  bar.style.animation = 'none'; void bar.offsetWidth; bar.style.animation = '';
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 3400);
}

// Drag & Drop
function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.add('drag-over');
}

function handleDragLeave() {
  document.getElementById('uploadZone').classList.remove('drag-over');
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('drag-over');
  const files = e.dataTransfer.files;
  if (files.length > 0) onFileChosen({ target: { files } });
}

function onFileChosen(e) {
  const file = e.target.files[0];
  if (!file) return;
  selectedFile = file;
  document.getElementById('fileName').textContent = file.name.substring(0, 20);
  toast('✓ Fichier: ' + file.name);
}

// OCR - Version ultra-rapide
async function runOCR() {
  if (!selectedFile) {
    toast('Sélectionnez une image', 'err');
    return;
  }

  if (ocrRunning) {
    toast('OCR en cours...', 'info');
    return;
  }

  ocrRunning = true;
  const ocrBtn = document.getElementById('ocrBtn');
  const ocrOutput = document.getElementById('ocrOutput');
  const ocrProgress = document.getElementById('ocrProgress');
  const ocrBar = document.getElementById('ocrBar');
  const ocrProgressText = document.getElementById('ocrProgressText');

  ocrBtn.disabled = true;
  ocrProgress.style.display = 'block';
  ocrProgressText.style.display = 'block';
  ocrOutput.textContent = '⏳ Extraction en cours...';
  ocrBar.style.width = '0%';

  try {
    const reader = new FileReader();
    reader.onload = async function(e) {
      try {
        const img = e.target.result;

        // Progress simulation
        let progress = 0;
        const progressInterval = setInterval(() => {
          if (progress < 90) {
            progress += Math.random() * 30;
            if (progress > 90) progress = 90;
            ocrBar.style.width = progress + '%';
          }
        }, 200);

        // Tesseract recognition
        const result = await Tesseract.recognize(img, 'fra', {
          logger: m => console.log('OCR:', m.progress)
        });

        clearInterval(progressInterval);
        ocrBar.style.width = '100%';
        ocrText = result.data.text;

        ocrOutput.textContent = ocrText || '⚠️ Aucun texte détecté';
        ocrProgress.style.display = 'none';
        ocrProgressText.style.display = 'none';
        toast('✓ Extraction terminée !', 'ok');
      } catch(err) {
        console.error('OCR Error:', err);
        ocrOutput.textContent = '❌ Erreur: ' + err.message;
        toast('Erreur OCR: ' + err.message, 'err');
      } finally {
        ocrRunning = false;
        ocrBtn.disabled = false;
      }
    };
    reader.readAsDataURL(selectedFile);
  } catch(err) {
    console.error('Error:', err);
    toast('Erreur: ' + err.message, 'err');
    ocrRunning = false;
    ocrBtn.disabled = false;
    ocrProgress.style.display = 'none';
    ocrProgressText.style.display = 'none';
  }
}

// Fill form from OCR
function fillFormFromOCR() {
  if (!ocrText) {
    toast('Aucun texte OCR', 'err');
    return;
  }

  const numberRegex = /\d+[\.,]\d{2}/g;
  const numbers = ocrText.match(numberRegex) || [];
  
  const dateRegex = /(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})/g;
  const dates = ocrText.match(dateRegex) || [];

  if (numbers.length > 0) {
    const amount = numbers[numbers.length - 1].replace(',', '.');
    document.getElementById('amountInput').value = amount;
  }

  if (dates.length > 0) {
    const dateStr = dates[0];
    const parts = dateStr.split(/[\/\-]/);
    if (parts.length === 3) {
      let year = parseInt(parts[2]);
      if (year < 100) year += (year < 30) ? 2000 : 1900;
      const formattedDate = `${year}-${String(parts[1]).padStart(2, '0')}-${String(parts[0]).padStart(2, '0')}`;
      document.getElementById('dateInput').value = formattedDate;
    }
  }

  document.getElementById('descInput').value = ocrText.substring(0, 80).trim();
  toast('✓ Formulaire rempli !', 'ok');
}

// Employee
function saveEmployeeInfo() {
  employeeInfo.nom = document.getElementById('empNom').value.trim();
  employeeInfo.prenom = document.getElementById('empPrenom').value.trim();
  employeeInfo.dept = document.getElementById('empDept').value.trim();
  localStorage.setItem('eqnovia_employee_info', JSON.stringify(employeeInfo));
}

function loadEmployeeInfo() {
  try {
    const saved = localStorage.getItem('eqnovia_employee_info');
    if (saved) {
      employeeInfo = JSON.parse(saved);
      document.getElementById('empNom').value = employeeInfo.nom || '';
      document.getElementById('empPrenom').value = employeeInfo.prenom || '';
      document.getElementById('empDept').value = employeeInfo.dept || '';
    }
  } catch (e) { console.error("Error", e); }
}

function toggleEmployeePanel() {
  const body = document.getElementById('employeeBody');
  const icon = document.getElementById('employeeToggleIcon');
  body.classList.toggle('collapsed');
  icon.textContent = body.classList.contains('collapsed') ? '▼' : '▲';
}
